name: Daily code push

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST (UTC+5:30)
  workflow_dispatch:         # lets you trigger it manually too

jobs:
  push-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's code
        run: node generate.js

      - name: Commit and push
        run: |
          git config user.name  "shubhamk177"
          git config user.email "shubhamkashyap87@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "feat: daily code $(date +'%Y-%m-%d')"
          git push
